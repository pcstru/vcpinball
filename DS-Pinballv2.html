<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Cyberpin - Pinball</title>
    <style>
        :root {
            --bg: #0a0a0f;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        canvas {
            display: block;
            max-height: 100vh;
            max-width: 100vw;
            border: 2px solid #1a1a3a;
            box-shadow: 0 0 60px rgba(100, 50, 255, 0.3), 0 0 120px rgba(20, 100, 255, 0.15);
            border-radius: 8px;
        }
        #instructions {
            position: fixed;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 12px;
            letter-spacing: 1px;
            pointer-events: none;
            text-align: center;
            z-index: 10;
        }
        #instructions span {
            color: #aaa;
        }
    </style>
</head>
<body>
    <canvas id="pinball"></canvas>
    <div id="instructions">
        <span>Z / ←</span> = Left Flipper &nbsp;|&nbsp;
        <span>M / →</span> = Right Flipper &nbsp;|&nbsp;
        <span>SPACE</span> = Launch &nbsp;|&nbsp;
        <span>R</span> = Restart
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('pinball');
            const ctx = canvas.getContext('2d');

            const VW = 500;
            const VH = 880;

            function resize() {
                const maxH = window.innerHeight - 20;
                const maxW = window.innerWidth - 20;
                const aspect = VW / VH;
                let w, h;
                if (maxW / maxH > aspect) {
                    h = maxH;
                    w = h * aspect;
                } else {
                    w = maxW;
                    h = w / aspect;
                }
                canvas.width = VW;
                canvas.height = VH;
                canvas.style.width = w + 'px';
                canvas.style.height = h + 'px';
            }
            window.addEventListener('resize', resize);
            resize();

            // ─────────── AUDIO ───────────
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playBeep(freq, duration, type = 'square', vol = 0.08, slide = 0) {
                if (!audioCtx) return;
                const t = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, t);
                if (slide) osc.frequency.linearRampToValueAtTime(freq + slide, t + duration);
                gain.gain.setValueAtTime(vol, t);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(t);
                osc.stop(t + duration);
            }

            function sfxBumper() { playBeep(600, 0.08, 'square', 0.1, -300); }

            function sfxTarget() { playBeep(900, 0.06, 'triangle', 0.12, 0);
                playBeep(1200, 0.04, 'triangle', 0.06, 0); }

            function sfxSlingshot() { playBeep(200, 0.1, 'sawtooth', 0.08, 400); }

            function sfxFlipper() { playBeep(80, 0.04, 'square', 0.05, 0); }

            function sfxDrain() { playBeep(60, 0.5, 'sawtooth', 0.15, -40); }

            function sfxLaunch() { playBeep(150, 0.4, 'triangle', 0.12, 500); }

            function sfxLaneChange() { playBeep(1500, 0.05, 'sine', 0.06, -200); }

            function sfxSpinner() { playBeep(2000, 0.03, 'triangle', 0.04, -500); }

            function sfxMultiball() { playBeep(523, 0.1, 'square', 0.15, 0);
                playBeep(659, 0.1, 'square', 0.15, 0);
                playBeep(784, 0.15, 'square', 0.15, 0); }

            function sfxBonus() { playBeep(800, 0.08, 'triangle', 0.1, 0);
                playBeep(1000, 0.08, 'triangle', 0.1, 0);
                playBeep(1200, 0.12, 'triangle', 0.1, 0); }

            // ─────────── PARTICLES ───────────
            const particles = [];

            function spawnParticles(x, y, count, color, speed = 3) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const spd = Math.random() * speed + speed * 0.3;
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * spd,
                        vy: Math.sin(angle) * spd,
                        life: 1,
                        decay: 0.02 + Math.random() * 0.06,
                        color,
                        radius: 1 + Math.random() * 2.5
                    });
                }
            }

            function updateParticles() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.05;
                    p.life -= p.decay;
                    if (p.life <= 0) particles.splice(i, 1);
                }
            }

            function drawParticles(ctx2) {
                for (const p of particles) {
                    ctx2.save();
                    ctx2.globalAlpha = p.life;
                    ctx2.fillStyle = p.color;
                    ctx2.shadowColor = p.color;
                    ctx2.shadowBlur = 6;
                    ctx2.beginPath();
                    ctx2.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx2.fill();
                    ctx2.restore();
                }
            }

            // ─────────── GAME STATE ───────────
            const STATE = {
                ATTRACT: 'attract',
                READY: 'ready',
                PLAYING: 'playing',
                BONUS_COUNT: 'bonus_count',
                GAME_OVER: 'game_over',
            };

            let gameState = STATE.ATTRACT;
            let score = 0;
            let ballsRemaining = 3;
            let currentBall = 0;
            let bonusMultiplier = 1;
            let bonusBase = 0;
            let spinnerCount = 0;
            let comboCount = 0;
            let comboTimer = 0;
            let multiballActive = false;
            let multiballCount = 0;
            let tiltWarnings = 0;
            let bonusDisplayTimer = 0;
            let bonusDisplayScore = 0;
            let bonusDisplayTarget = 0;
            let messageText = '';
            let messageTimer = 0;
            let attractBallAngle = 0;
            let gameTime = 0;
            let launchCharging = false;
            let launchChargeStart = 0;
            let highScore = parseInt(localStorage.getItem('cyberpinHighScore') || '0');

            const laneLit = [false, false, false, false, false];
            const dropTargetsDown = [false, false, false, false];
            let dropTargetsCompleted = 0;

            function resetDropTargets() { for (let i = 0; i < dropTargetsDown.length; i++) dropTargetsDown[i] = false; }

            function resetLanes() { for (let i = 0; i < laneLit.length; i++) laneLit[i] = false; }

            function allLanesLit() { return laneLit.every(l => l); }

            function allDropTargetsDown() { return dropTargetsDown.every(d => d); }

            function resetGame() {
                score = 0;
                ballsRemaining = 3;
                currentBall = 0;
                bonusMultiplier = 1;
                bonusBase = 0;
                spinnerCount = 0;
                comboCount = 0;
                comboTimer = 0;
                multiballActive = false;
                multiballCount = 0;
                tiltWarnings = 0;
                bonusDisplayTimer = 0;
                bonusDisplayScore = 0;
                bonusDisplayTarget = 0;
                messageText = '';
                messageTimer = 0;
                launchCharging = false;
                launchChargeStart = 0;
                resetDropTargets();
                resetLanes();
                dropTargetsCompleted = 0;
                balls.length = 0;
                particles.length = 0;
                gameState = STATE.READY;
                spawnBallForLaunch();
            }

            function showMessage(msg, duration = 120) {
                messageText = msg;
                messageTimer = duration;
            }

            // ─────────── BOARD GEOMETRY ───────────
            // Main playfield boundary walls
            const walls = [
                { x1: 35, y1: 75, x2: 465, y2: 75 }, // top
                { x1: 35, y1: 75, x2: 30, y2: 200 }, // left upper
                { x1: 30, y1: 200, x2: 30, y2: 600 }, // left main
                { x1: 30, y1: 600, x2: 45, y2: 700 }, // left lower
                { x1: 465, y1: 75, x2: 470, y2: 200 }, // right upper
                { x1: 470, y1: 200, x2: 470, y2: 600 }, // right main
                { x1: 470, y1: 600, x2: 455, y2: 700 }, // right lower
                { x1: 45, y1: 700, x2: 140, y2: 720 }, // bottom left
                { x1: 455, y1: 700, x2: 360, y2: 720 }, // bottom right
                { x1: 140, y1: 720, x2: 360, y2: 720 }, // drain bottom
                { x1: 140, y1: 720, x2: 130, y2: 790 }, // deep drain left
                { x1: 360, y1: 720, x2: 370, y2: 790 }, // deep drain right
                { x1: 130, y1: 790, x2: 370, y2: 790 }, // bottom
                // ── LAUNCH LANE (wide, clean channel) ──
                { x1: 420, y1: 195, x2: 420, y2: 735 }, // left wall of lane
                { x1: 420, y1: 735, x2: 458, y2: 735 }, // bottom of lane
                { x1: 458, y1: 195, x2: 458, y2: 735 }, // right wall of lane
            ];

            // Guide walls at top
            const guideWalls = [
                { x1: 60, y1: 130, x2: 100, y2: 170 },
                { x1: 140, y1: 130, x2: 140, y2: 170 },
                { x1: 220, y1: 130, x2: 220, y2: 170 },
                { x1: 300, y1: 130, x2: 300, y2: 170 },
                { x1: 360, y1: 130, x2: 360, y2: 170 },
                { x1: 410, y1: 130, x2: 395, y2: 170 },
            ];

            const rolloverLanes = [
                { x: 80, y: 115, w: 40, h: 20 },
                { x: 155, y: 115, w: 40, h: 20 },
                { x: 230, y: 115, w: 40, h: 20 },
                { x: 305, y: 115, w: 40, h: 20 },
                { x: 380, y: 115, w: 40, h: 20 },
            ];

            const popBumpers = [
                { x: 160, y: 280, r: 28, power: 12, color: '#ff3366', glowColor: '#ff0044' },
                { x: 340, y: 280, r: 28, power: 12, color: '#ff6633', glowColor: '#ff4400' },
                { x: 250, y: 350, r: 28, power: 12, color: '#ff3399', glowColor: '#ff0088' },
                { x: 120, y: 370, r: 22, power: 10, color: '#cc33ff', glowColor: '#8800ff' },
                { x: 380, y: 370, r: 22, power: 10, color: '#33ccff', glowColor: '#0088ff' },
            ];

            const dropTargets = [
                { x: 130, y: 500, w: 14, h: 40, color: '#ffcc00', glowColor: '#ffaa00' },
                { x: 200, y: 500, w: 14, h: 40, color: '#ffcc00', glowColor: '#ffaa00' },
                { x: 270, y: 500, w: 14, h: 40, color: '#ffcc00', glowColor: '#ffaa00' },
                { x: 340, y: 500, w: 14, h: 40, color: '#ffcc00', glowColor: '#ffaa00' },
            ];

            const spinner = { x: 250, y: 210, length: 60, angle: 0, angularVelocity: 0, hitCount: 0 };
            const spinnerPosts = [{ x: 190, y: 210, r: 8 }, { x: 310, y: 210, r: 8 }];

            const slingshots = [
                { x1: 45, y1: 580, x2: 90, y2: 640, power: 14, name: 'left' },
                // Kept left of the launch lane (x > ~418) so the ball does not hit this segment on the way out
                { x1: 400, y1: 580, x2: 355, y2: 640, power: 14, name: 'right' },
            ];

            const flipperDefs = [
                { pivotX: 135, pivotY: 685, length: 95, restAngle: 0.55, activeAngle: -0.55, color: '#00ddff',
                    glowColor: '#00aacc', name: 'left' },
                { pivotX: 365, pivotY: 685, length: 95, restAngle: Math.PI - 0.55, activeAngle: Math.PI + 0.55,
                    color: '#ff4466', glowColor: '#cc0033', name: 'right' },
            ];

            // ─────────── FLIPPERS ───────────
            const flippers = flipperDefs.map(def => ({
                pivotX: def.pivotX,
                pivotY: def.pivotY,
                length: def.length,
                angle: def.restAngle,
                restAngle: def.restAngle,
                activeAngle: def.activeAngle,
                angularVelocity: 0,
                isActive: false,
                color: def.color,
                glowColor: def.glowColor,
                name: def.name,
                width: 14,
            }));

            function getFlipperEndpoints(flipper) {
                const tipX = flipper.pivotX + Math.cos(flipper.angle) * flipper.length;
                const tipY = flipper.pivotY + Math.sin(flipper.angle) * flipper.length;
                return { x1: flipper.pivotX, y1: flipper.pivotY, x2: tipX, y2: tipY };
            }

            // ─────────── BALLS ───────────
            const balls = [];
            const BALL_RADIUS = 8;

            function createBall(x, y, vx = 0, vy = 0) {
                return {
                    x,
                    y,
                    vx,
                    vy,
                    radius: BALL_RADIUS,
                    lastBumperHit: -1,
                    trail: [],
                    active: true,
                    inLaunchLane: false,
                    launchPower: 0,
                };
            }

            function spawnBallForLaunch() {
                // Ball sits in the launch lane, just above the plunger
                const ball = createBall(439, 710, 0, 0);
                ball.inLaunchLane = true;
                ball.launchPower = 0;
                balls.push(ball);
                gameState = STATE.READY;
                currentBall++;
                launchCharging = false;
                launchChargeStart = 0;
                showMessage('BALL ' + currentBall + ' - HOLD SPACE', 180);
            }

            function launchBall(ball, power) {
                ball.inLaunchLane = false;
                // Strong upward launch with a gentle leftward drift
                ball.vx = -(power * 2.5);
                ball.vy = -(power * 34 + 10);
                ball.x = 439;
                ball.y = 700;
                gameState = STATE.PLAYING;
                launchCharging = false;
                sfxLaunch();
                showMessage('', 0);
                spawnParticles(439, 710, 15, '#ffaa00', 5);
            }

            function drainBall(ball) {
                ball.active = false;
                sfxDrain();
                spawnParticles(ball.x, ball.y, 30, '#ff4444', 4);
                const idx = balls.indexOf(ball);
                if (idx >= 0) balls.splice(idx, 1);

                if (balls.length === 0) {
                    if (multiballActive) { multiballActive = false;
                        multiballCount = 0; }
                    const bonus = bonusBase * bonusMultiplier;
                    bonusDisplayScore = 0;
                    bonusDisplayTarget = bonus;
                    bonusDisplayTimer = 120;
                    gameState = STATE.BONUS_COUNT;
                    score += bonus;
                    if (bonus > 0) sfxBonus();
                    showMessage('BONUS: ' + bonus + ' (' + bonusMultiplier + 'x)', 120);
                    bonusBase = 0;
                    bonusMultiplier = 1;
                    resetLanes();
                    resetDropTargets();
                    comboCount = 0;
                    comboTimer = 0;
                    launchCharging = false;

                    setTimeout(() => {
                        if (ballsRemaining > 0) {
                            ballsRemaining--;
                            spawnBallForLaunch();
                        } else {
                            gameState = STATE.GAME_OVER;
                            if (score > highScore) {
                                highScore = score;
                                localStorage.setItem('cyberpinHighScore', highScore);
                                showMessage('NEW HIGH SCORE! ' + highScore, 300);
                            } else {
                                showMessage('GAME OVER - PRESS R', 300);
                            }
                        }
                    }, 2500);
                }
            }

            // ─────────── COLLISION HELPERS ───────────
            function closestPointOnSegment(px, py, x1, y1, x2, y2) {
                const dx = x2 - x1;
                const dy = y2 - y1;
                const lenSq = dx * dx + dy * dy;
                if (lenSq === 0) return { x: x1, y: y1, t: 0 };
                let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
                t = Math.max(0, Math.min(1, t));
                return { x: x1 + t * dx, y: y1 + t * dy, t };
            }

            function circleSegmentCollision(cx, cy, r, x1, y1, x2, y2) {
                const closest = closestPointOnSegment(cx, cy, x1, y1, x2, y2);
                const dx = cx - closest.x;
                const dy = cy - closest.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < r && dist > 0.0001) {
                    return { hit: true, nx: dx / dist, ny: dy / dist, overlap: r - dist, cx: closest.x, cy: closest.y };
                }
                if (dist < 0.0001) {
                    const segDx = x2 - x1;
                    const segDy = y2 - y1;
                    const segLen = Math.sqrt(segDx * segDx + segDy * segDy);
                    return { hit: true, nx: -segDy / segLen, ny: segDx / segLen, overlap: r, cx: closest.x, cy: closest
                            .y };
                }
                return { hit: false };
            }

            function circleCircleCollision(cx1, cy1, r1, cx2, cy2, r2) {
                const dx = cx1 - cx2;
                const dy = cy1 - cy2;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const minDist = r1 + r2;
                if (dist < minDist && dist > 0.0001) {
                    return { hit: true, nx: dx / dist, ny: dy / dist, overlap: minDist - dist };
                }
                return { hit: false };
            }

            // ─────────── PHYSICS ───────────
            const GRAVITY = 0.35;
            const FRICTION = 0.999;
            const RESTITUTION = 0.55;
            const MAX_SPEED = 24;

            function resolveCollision(ball, nx, ny, overlap, surfaceVx = 0, surfaceVy = 0) {
                ball.x += nx * overlap;
                ball.y += ny * overlap;
                const relVx = ball.vx - surfaceVx;
                const relVy = ball.vy - surfaceVy;
                const relVn = relVx * nx + relVy * ny;
                if (relVn < 0) {
                    ball.vx -= (1 + RESTITUTION) * relVn * nx;
                    ball.vy -= (1 + RESTITUTION) * relVn * ny;
                    ball.vx += surfaceVx * 0.7;
                    ball.vy += surfaceVy * 0.7;
                }
                const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                if (speed > MAX_SPEED) {
                    const s = MAX_SPEED / speed;
                    ball.vx *= s;
                    ball.vy *= s;
                }
            }

            function updateBallPhysics(ball) {
                if (!ball.active) return;
                if (ball.inLaunchLane) return;

                ball.vy += GRAVITY;
                ball.vx *= FRICTION;
                ball.vy *= FRICTION;
                ball.x += ball.vx;
                ball.y += ball.vy;

                ball.trail.push({ x: ball.x, y: ball.y, life: 1 });
                if (ball.trail.length > 12) ball.trail.shift();
                for (const t of ball.trail) t.life -= 0.08;

                const allWalls = [...walls, ...guideWalls];
                for (const wall of allWalls) {
                    const result = circleSegmentCollision(ball.x, ball.y, ball.radius, wall.x1, wall.y1, wall.x2,
                    wall.y2);
                    if (result.hit) {
                        resolveCollision(ball, result.nx, result.ny, result.overlap);
                    }
                }

                for (const post of spinnerPosts) {
                    const result = circleCircleCollision(ball.x, ball.y, ball.radius, post.x, post.y, post.r);
                    if (result.hit) resolveCollision(ball, result.nx, result.ny, result.overlap);
                }

                for (let i = 0; i < popBumpers.length; i++) {
                    const bumper = popBumpers[i];
                    const result = circleCircleCollision(ball.x, ball.y, ball.radius, bumper.x, bumper.y, bumper.r);
                    if (result.hit) {
                        resolveCollision(ball, result.nx, result.ny, result.overlap);
                        ball.vx += result.nx * bumper.power;
                        ball.vy += result.ny * bumper.power;
                        if (ball.lastBumperHit !== i) {
                            score += 100;
                            bonusBase += 25;
                            ball.lastBumperHit = i;
                            sfxBumper();
                            spawnParticles(bumper.x, bumper.y, 8, bumper.color, 3);
                            comboCount++;
                            comboTimer = 90;
                            if (comboCount >= 10) {
                                score += 500;
                                showMessage('COMBO x' + comboCount + '!', 60);
                            }
                        }
                    }
                }
                let nearAnyBumper = false;
                for (const b of popBumpers) {
                    const dx = ball.x - b.x;
                    const dy = ball.y - b.y;
                    if (Math.sqrt(dx * dx + dy * dy) < b.r + ball.radius + 15) nearAnyBumper = true;
                }
                if (!nearAnyBumper) ball.lastBumperHit = -1;

                for (let i = 0; i < dropTargets.length; i++) {
                    if (dropTargetsDown[i]) continue;
                    const dt = dropTargets[i];
                    const halfW = dt.w / 2;
                    const halfH = dt.h / 2;
                    const closestX = Math.max(dt.x - halfW, Math.min(ball.x, dt.x + halfW));
                    const closestY = Math.max(dt.y - halfH, Math.min(ball.y, dt.y + halfH));
                    const dx = ball.x - closestX;
                    const dy = ball.y - closestY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < ball.radius) {
                        dropTargetsDown[i] = true;
                        score += 500;
                        bonusBase += 100;
                        sfxTarget();
                        spawnParticles(dt.x, dt.y, 15, dt.color, 5);
                        const nx = dist > 0.001 ? dx / dist : 0;
                        const ny = dist > 0.001 ? dy / dist : -1;
                        resolveCollision(ball, nx, ny, ball.radius - dist);
                        ball.vx += nx * 6;
                        ball.vy += ny * 6;
                        if (allDropTargetsDown()) {
                            dropTargetsCompleted++;
                            score += 2000 * dropTargetsCompleted;
                            bonusMultiplier = Math.min(5, bonusMultiplier + 1);
                            showMessage('ALL TARGETS! +' + (2000 * dropTargetsCompleted) + '  MULTIPLIER ' +
                                bonusMultiplier + 'x', 150);
                            sfxBonus();
                            spawnParticles(235, 500, 40, '#ffff00', 8);
                            setTimeout(() => resetDropTargets(), 1500);
                        }
                    }
                }

                for (const sling of slingshots) {
                    const result = circleSegmentCollision(ball.x, ball.y, ball.radius, sling.x1, sling.y1, sling.x2,
                        sling.y2);
                    if (result.hit) {
                        resolveCollision(ball, result.nx, result.ny, result.overlap);
                        ball.vx += result.nx * sling.power;
                        ball.vy += result.ny * sling.power;
                        score += 10;
                        sfxSlingshot();
                        spawnParticles(result.cx, result.cy, 6, '#ffaa00', 3);
                    }
                }

                for (const flipper of flippers) {
                    const ep = getFlipperEndpoints(flipper);
                    const result = circleSegmentCollision(ball.x, ball.y, ball.radius, ep.x1, ep.y1, ep.x2, ep.y2);
                    if (result.hit) {
                        const rdx = result.cx - flipper.pivotX;
                        const rdy = result.cy - flipper.pivotY;
                        const surfaceVx = -rdy * flipper.angularVelocity;
                        const surfaceVy = rdx * flipper.angularVelocity;
                        resolveCollision(ball, result.nx, result.ny, result.overlap, surfaceVx, surfaceVy);
                        if (Math.abs(flipper.angularVelocity) > 0.05) {
                            ball.vx += surfaceVx * 0.8;
                            ball.vy += surfaceVy * 0.8;
                        }
                        spawnParticles(result.cx, result.cy, 3, flipper.color, 2);
                    }
                }

                const sx1 = spinner.x - Math.cos(spinner.angle) * spinner.length / 2;
                const sy1 = spinner.y - Math.sin(spinner.angle) * spinner.length / 2;
                const sx2 = spinner.x + Math.cos(spinner.angle) * spinner.length / 2;
                const sy2 = spinner.y + Math.sin(spinner.angle) * spinner.length / 2;
                const spResult = circleSegmentCollision(ball.x, ball.y, ball.radius, sx1, sy1, sx2, sy2);
                if (spResult.hit) {
                    resolveCollision(ball, spResult.nx, spResult.ny, spResult.overlap);
                    const relV = ball.vx * spResult.nx + ball.vy * spResult.ny;
                    spinner.angularVelocity += relV * 0.03;
                    spinner.hitCount++;
                    spinnerCount++;
                    score += 100;
                    sfxSpinner();
                    if (spinnerCount % 20 === 0 && spinnerCount > 0) {
                        score += 5000;
                        showMessage('SPINNER BONUS! +5000', 90);
                        sfxBonus();
                    }
                }

                for (let i = 0; i < rolloverLanes.length; i++) {
                    const lane = rolloverLanes[i];
                    if (ball.x > lane.x - lane.w / 2 && ball.x < lane.x + lane.w / 2 &&
                        ball.y > lane.y - lane.h / 2 && ball.y < lane.y + lane.h / 2) {
                        if (!laneLit[i]) {
                            laneLit[i] = true;
                            score += 1000;
                            bonusBase += 200;
                            sfxLaneChange();
                            spawnParticles(lane.x, lane.y, 10, '#00ff88', 3);
                            if (allLanesLit()) {
                                bonusMultiplier = Math.min(5, bonusMultiplier + 1);
                                showMessage('ALL LANES LIT! MULTIPLIER ' + bonusMultiplier + 'x', 150);
                                sfxBonus();
                                resetLanes();
                                spawnParticles(230, 115, 30, '#00ff88', 6);
                            }
                        }
                    }
                }

                if (ball.y > 745 && ball.x > 130 && ball.x < 370) {
                    drainBall(ball);
                }
                if (ball.x < 25) { ball.x = 25;
                    ball.vx = Math.abs(ball.vx) * 0.5; }
                if (ball.x > 478) { ball.x = 478;
                    ball.vx = -Math.abs(ball.vx) * 0.5; }
                if (ball.y < 68) { ball.y = 68;
                    ball.vy = Math.abs(ball.vy) * 0.5; }
            }

            // ─────────── INPUT ───────────
            function handleSpaceDown() {
                initAudio();
                if (gameState === STATE.ATTRACT || gameState === STATE.GAME_OVER) {
                    resetGame();
                    // Immediately start charging for the new ball
                    launchCharging = true;
                    launchChargeStart = performance.now();
                    return;
                }
                if (gameState === STATE.READY) {
                    launchCharging = true;
                    launchChargeStart = performance.now();
                }
            }

            function handleSpaceUp() {
                if (!launchCharging) return;
                const chargeTime = Math.min(2000, performance.now() - launchChargeStart);
                const power = Math.min(1, chargeTime / 2000);
                const ball = balls.find(b => b.inLaunchLane);
                if (ball && gameState === STATE.READY) {
                    launchBall(ball, Math.max(0.2, power));
                }
                launchCharging = false;
            }

            window.addEventListener('keydown', (e) => {
                initAudio();
                if (e.code === 'Space') {
                    e.preventDefault();
                    handleSpaceDown();
                }
                if (e.code === 'KeyR') resetGame();
                if (e.code === 'KeyZ' || e.code === 'ArrowLeft') {
                    const flipper = flippers[0];
                    if (!flipper.isActive) { flipper.isActive = true;
                        flipper.angularVelocity = -0.35;
                        sfxFlipper(); }
                }
                if (e.code === 'KeyM' || e.code === 'ArrowRight') {
                    const flipper = flippers[1];
                    if (!flipper.isActive) { flipper.isActive = true;
                        flipper.angularVelocity = 0.35;
                        sfxFlipper(); }
                }
                if (e.code === 'KeyT' && gameState === STATE.PLAYING) {
                    tiltWarnings++;
                    if (tiltWarnings >= 3) {
                        showMessage('TILT!', 180);
                        for (const b of [...balls]) { if (!b.inLaunchLane) drainBall(b); }
                    } else {
                        showMessage('WARNING ' + tiltWarnings + '/3', 60);
                    }
                }
            });

            window.addEventListener('keyup', (e) => {
                if (e.code === 'Space') handleSpaceUp();
                if (e.code === 'KeyZ' || e.code === 'ArrowLeft') {
                    flippers[0].isActive = false;
                    flippers[0].angularVelocity = 0.2;
                }
                if (e.code === 'KeyM' || e.code === 'ArrowRight') {
                    flippers[1].isActive = false;
                    flippers[1].angularVelocity = -0.2;
                }
            });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initAudio();
                const rect = canvas.getBoundingClientRect();
                for (const touch of e.changedTouches) {
                    const tx = (touch.clientX - rect.left) / rect.width * VW;
                    const ty = (touch.clientY - rect.top) / rect.height * VH;
                    if (ty > 680 && tx > 410) {
                        handleSpaceDown();
                    } else if (tx < VW / 2) {
                        flippers[0].isActive = true;
                        flippers[0].angularVelocity = -0.35;
                        sfxFlipper();
                    } else {
                        flippers[1].isActive = true;
                        flippers[1].angularVelocity = 0.35;
                        sfxFlipper();
                    }
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                flippers[0].isActive = false;
                flippers[0].angularVelocity = 0.2;
                flippers[1].isActive = false;
                flippers[1].angularVelocity = -0.2;
                if (launchCharging) handleSpaceUp();
            }, { passive: false });

            // ─────────── UPDATE ───────────
            function updateFlippers() {
                for (const flipper of flippers) {
                    if (flipper.isActive) {
                        const target = flipper.activeAngle;
                        const diff = target - flipper.angle;
                        if (Math.abs(diff) < 0.02) { flipper.angle = target;
                            flipper.angularVelocity = 0; } else {
                            flipper.angularVelocity += Math.sign(diff) * 0.04;
                            flipper.angularVelocity = Math.sign(diff) * Math.min(Math.abs(flipper.angularVelocity),
                                0.4);
                        }
                    } else {
                        const target = flipper.restAngle;
                        const diff = target - flipper.angle;
                        if (Math.abs(diff) < 0.01) { flipper.angle = target;
                            flipper.angularVelocity = 0; } else {
                            flipper.angularVelocity += Math.sign(diff) * 0.015;
                            flipper.angularVelocity = Math.sign(diff) * Math.min(Math.abs(flipper.angularVelocity),
                                0.25);
                        }
                    }
                    flipper.angle += flipper.angularVelocity;
                    const minA = Math.min(flipper.restAngle, flipper.activeAngle);
                    const maxA = Math.max(flipper.restAngle, flipper.activeAngle);
                    if (flipper.angle < minA - 0.1) flipper.angle = minA - 0.1;
                    if (flipper.angle > maxA + 0.1) flipper.angle = maxA + 0.1;
                }
            }

            function updateSpinner() {
                spinner.angularVelocity *= 0.96;
                spinner.angle += spinner.angularVelocity;
                if (Math.abs(spinner.angularVelocity) < 0.001) spinner.angularVelocity = 0;
            }

            function update() {
                gameTime++;
                if (comboTimer > 0) { comboTimer--; if (comboTimer === 0) comboCount = 0; }
                if (messageTimer > 0) messageTimer--;
                if (bonusDisplayTimer > 0) {
                    bonusDisplayTimer--;
                    bonusDisplayScore = Math.floor(bonusDisplayTarget * (1 - bonusDisplayTimer / 120));
                }

                updateFlippers();
                updateSpinner();
                updateParticles();

                for (const ball of balls) {
                    for (const t of ball.trail) t.life -= 0.08;
                    ball.trail = ball.trail.filter(t => t.life > 0);
                }
                for (const ball of balls) updateBallPhysics(ball);
                for (let i = balls.length - 1; i >= 0; i--) {
                    if (!balls[i].active && !balls[i].inLaunchLane) balls.splice(i, 1);
                }

                if (launchCharging && gameState === STATE.READY) {
                    const ball = balls.find(b => b.inLaunchLane);
                    if (ball) {
                        const elapsed = Math.min(2000, performance.now() - launchChargeStart);
                        ball.launchPower = Math.min(1, elapsed / 2000);
                    }
                    if (performance.now() - launchChargeStart > 3500) handleSpaceUp();
                }
                if (launchCharging && gameState !== STATE.READY) launchCharging = false;
                if (gameState === STATE.ATTRACT) attractBallAngle += 0.03;

                if (!multiballActive && gameState === STATE.PLAYING && score >= 50000 && score % 50000 < 100 &&
                    balls.length === 1 && balls[0] && !balls[0].inLaunchLane) {
                    if (Math.random() < 0.3 && multiballCount < 2) startMultiball();
                }
            }

            function startMultiball() {
                multiballActive = true;
                multiballCount++;
                sfxMultiball();
                showMessage('MULTIBALL!', 150);
                for (let i = 0; i < 2; i++) {
                    balls.push(createBall(250 + Math.random() * 40 - 20, 150 + Math.random() * 50,
                        Math.random() * 4 - 2, Math.random() * 3 + 2));
                }
                spawnParticles(250, 150, 50, '#ffffff', 8);
            }

            // ─────────── RENDER ───────────
            function drawPlayfieldBackground() {
                const gradient = ctx.createLinearGradient(0, 0, 0, VH);
                gradient.addColorStop(0, '#0a0a1a');
                gradient.addColorStop(0.3, '#0d0d24');
                gradient.addColorStop(0.7, '#0f0f28');
                gradient.addColorStop(1, '#080818');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, VW, VH);

                ctx.strokeStyle = 'rgba(40,40,80,0.25)';
                ctx.lineWidth = 0.5;
                for (let x = 25; x < VW; x += 25) { ctx.beginPath();
                    ctx.moveTo(x, 70);
                    ctx.lineTo(x, 730);
                    ctx.stroke(); }
                for (let y = 70; y < 730; y += 25) { ctx.beginPath();
                    ctx.moveTo(30, y);
                    ctx.lineTo(470, y);
                    ctx.stroke(); }

                ctx.save();
                ctx.strokeStyle = 'rgba(80,80,180,0.4)';
                ctx.lineWidth = 2;
                ctx.shadowColor = 'rgba(100,100,255,0.5)';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.moveTo(35, 75);
                ctx.lineTo(465, 75);
                ctx.lineTo(470, 200);
                ctx.lineTo(470, 600);
                ctx.lineTo(455, 700);
                ctx.lineTo(360, 720);
                ctx.lineTo(140, 720);
                ctx.lineTo(45, 700);
                ctx.lineTo(30, 600);
                ctx.lineTo(30, 200);
                ctx.closePath();
                ctx.stroke();
                ctx.restore();

                const drainGrad = ctx.createLinearGradient(0, 700, 0, 790);
                drainGrad.addColorStop(0, 'rgba(0,0,0,0)');
                drainGrad.addColorStop(0.4, 'rgba(0,0,0,0.6)');
                drainGrad.addColorStop(1, 'rgba(0,0,0,0.9)');
                ctx.fillStyle = drainGrad;
                ctx.fillRect(130, 720, 240, 70);
            }

            function drawWalls() {
                ctx.strokeStyle = 'rgba(150,150,220,0.6)';
                ctx.lineWidth = 3;
                ctx.shadowColor = 'rgba(100,100,220,0.4)';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                for (const wall of walls) {
                    ctx.moveTo(wall.x1, wall.y1);
                    ctx.lineTo(wall.x2, wall.y2);
                }
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(120,120,200,0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (const gw of guideWalls) { ctx.moveTo(gw.x1, gw.y1);
                    ctx.lineTo(gw.x2, gw.y2); }
                ctx.stroke();
            }

            function drawRolloverLanes() {
                for (let i = 0; i < rolloverLanes.length; i++) {
                    const lane = rolloverLanes[i];
                    const lit = laneLit[i];
                    ctx.save();
                    ctx.fillStyle = lit ? 'rgba(0,255,130,0.8)' : 'rgba(0,100,60,0.4)';
                    ctx.shadowColor = lit ? '#00ff88' : 'transparent';
                    ctx.shadowBlur = lit ? 20 : 0;
                    ctx.strokeStyle = lit ? '#00ff88' : 'rgba(0,150,80,0.6)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.roundRect(lane.x - lane.w / 2, lane.y - lane.h / 2, lane.w, lane.h, 5);
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = '#fff';
                    ctx.font = '10px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText(['A', 'B', 'C', 'D', 'E'][i], lane.x, lane.y + 4);
                    ctx.restore();
                }
            }

            function drawPopBumpers() {
                for (const bumper of popBumpers) {
                    ctx.save();
                    ctx.shadowColor = bumper.glowColor;
                    ctx.shadowBlur = 20;
                    const grad = ctx.createRadialGradient(bumper.x - 5, bumper.y - 8, bumper.r * 0.1,
                        bumper.x, bumper.y, bumper.r);
                    grad.addColorStop(0, '#ffffff');
                    grad.addColorStop(0.3, bumper.color);
                    grad.addColorStop(1, 'rgba(0,0,0,0.8)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(bumper.x, bumper.y, bumper.r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = bumper.color;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(bumper.x, bumper.y, bumper.r * 0.6, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.arc(bumper.x, bumper.y, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            function drawDropTargets() {
                for (let i = 0; i < dropTargets.length; i++) {
                    if (dropTargetsDown[i]) continue;
                    const dt = dropTargets[i];
                    ctx.save();
                    ctx.fillStyle = dt.color;
                    ctx.shadowColor = dt.glowColor;
                    ctx.shadowBlur = 12;
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1.5;
                    const halfW = dt.w / 2;
                    const halfH = dt.h / 2;
                    ctx.beginPath();
                    ctx.roundRect(dt.x - halfW, dt.y - halfH, dt.w, dt.h, 3);
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 6;
                    ctx.beginPath();
                    ctx.arc(dt.x, dt.y - halfH + 8, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            function drawSpinner() {
                const sx1 = spinner.x - Math.cos(spinner.angle) * spinner.length / 2;
                const sy1 = spinner.y - Math.sin(spinner.angle) * spinner.length / 2;
                const sx2 = spinner.x + Math.cos(spinner.angle) * spinner.length / 2;
                const sy2 = spinner.y + Math.sin(spinner.angle) * spinner.length / 2;
                for (const post of spinnerPosts) {
                    ctx.fillStyle = '#888';
                    ctx.beginPath();
                    ctx.arc(post.x, post.y, post.r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#aaa';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                ctx.save();
                ctx.strokeStyle = '#ffdd00';
                ctx.lineWidth = 4;
                ctx.shadowColor = '#ffaa00';
                ctx.shadowBlur = 15;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(sx1, sy1);
                ctx.lineTo(sx2, sy2);
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(spinner.x, spinner.y, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            function drawSlingshots() {
                for (const sling of slingshots) {
                    ctx.save();
                    ctx.strokeStyle = '#ff8800';
                    ctx.lineWidth = 4;
                    ctx.shadowColor = '#ff6600';
                    ctx.shadowBlur = 10;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(sling.x1, sling.y1);
                    ctx.lineTo(sling.x2, sling.y2);
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(255,100,0,0.15)';
                    ctx.beginPath();
                    const midX = (sling.x1 + sling.x2) / 2;
                    const midY = (sling.y1 + sling.y2) / 2;
                    const nx = -(sling.y2 - sling.y1);
                    const ny = (sling.x2 - sling.x1);
                    const nLen = Math.sqrt(nx * nx + ny * ny);
                    ctx.moveTo(sling.x1, sling.y1);
                    ctx.lineTo(sling.x2, sling.y2);
                    ctx.lineTo(midX + nx / nLen * 20, midY + ny / nLen * 20);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }
            }

            function drawFlippers() {
                for (const flipper of flippers) {
                    const ep = getFlipperEndpoints(flipper);
                    ctx.save();
                    const grad = ctx.createLinearGradient(flipper.pivotX, flipper.pivotY, ep.x2, ep.y2);
                    grad.addColorStop(0, flipper.color);
                    grad.addColorStop(1, flipper.glowColor);
                    ctx.fillStyle = grad;
                    ctx.shadowColor = flipper.glowColor;
                    ctx.shadowBlur = 12;
                    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                    ctx.lineWidth = 2;
                    ctx.lineCap = 'round';
                    const dx = ep.x2 - flipper.pivotX;
                    const dy = ep.y2 - flipper.pivotY;
                    const len = Math.sqrt(dx * dx + dy * dy);
                    const ux = dx / len;
                    const uy = dy / len;
                    const perpX = -uy;
                    const perpY = ux;
                    const baseWidth = flipper.width;
                    const tipWidth = flipper.width * 0.5;
                    ctx.beginPath();
                    ctx.moveTo(flipper.pivotX + perpX * baseWidth, flipper.pivotY + perpY * baseWidth);
                    ctx.lineTo(ep.x2 + perpX * tipWidth, ep.y2 + perpY * tipWidth);
                    ctx.arcTo(ep.x2, ep.y2, ep.x2 - perpX * tipWidth, ep.y2 - perpY * tipWidth, tipWidth);
                    ctx.lineTo(flipper.pivotX - perpX * baseWidth, flipper.pivotY - perpY * baseWidth);
                    ctx.arcTo(flipper.pivotX, flipper.pivotY,
                        flipper.pivotX + perpX * baseWidth, flipper.pivotY + perpY * baseWidth, baseWidth);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 6;
                    ctx.beginPath();
                    ctx.arc(flipper.pivotX, flipper.pivotY, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            function drawLaunchLane() {
                ctx.save();
                // Lane channel background
                ctx.fillStyle = 'rgba(20,22,45,0.8)';
                ctx.strokeStyle = 'rgba(120,140,220,0.6)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(421, 196, 36, 538, 4);
                ctx.fill();
                ctx.stroke();

                // Plunger
                const ballInLane = balls.find(b => b.inLaunchLane);
                const power = ballInLane ? ballInLane.launchPower : 0;
                const plungerBaseY = 725;
                const plungerY = plungerBaseY - power * 65;

                // Spring
                ctx.strokeStyle = '#666';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 0;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(439, plungerBaseY);
                ctx.lineTo(439, plungerY + 9);
                ctx.stroke();
                ctx.setLineDash([]);

                // Plunger pad
                ctx.fillStyle = '#ee4444';
                ctx.shadowColor = '#ff2222';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(439, plungerY, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Housing
                ctx.fillStyle = '#2a2a38';
                ctx.strokeStyle = '#555';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(430, 730, 18, 14, 4);
                ctx.fill();
                ctx.stroke();

                // Top exit arrow
                const alpha = 0.4 + Math.sin(gameTime * 0.06) * 0.3;
                ctx.fillStyle = `rgba(200,220,255,${alpha})`;
                ctx.font = '16px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText('▲', 439, 218);

                ctx.restore();
            }

            function drawBalls() {
                for (const ball of balls) {
                    if (!ball.active) continue;
                    for (const t of ball.trail) {
                        if (t.life <= 0) continue;
                        ctx.save();
                        ctx.globalAlpha = t.life * 0.5;
                        ctx.fillStyle = '#ffffff';
                        ctx.shadowColor = '#88ccff';
                        ctx.shadowBlur = 4;
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, ball.radius * 0.6, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }
                    ctx.save();
                    const ballGrad = ctx.createRadialGradient(ball.x - 2, ball.y - 3, ball.radius * 0.1,
                        ball.x, ball.y, ball.radius);
                    ballGrad.addColorStop(0, '#ffffff');
                    ballGrad.addColorStop(0.4, '#cccccc');
                    ballGrad.addColorStop(1, '#444466');
                    ctx.fillStyle = ballGrad;
                    ctx.shadowColor = '#aaccff';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.beginPath();
                    ctx.arc(ball.x - 2, ball.y - 3, ball.radius * 0.35, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            function drawDMD() {
                const dmdX = 60,
                    dmdY = 15,
                    dmdW = 380,
                    dmdH = 45;
                ctx.save();
                ctx.fillStyle = '#111118';
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(dmdX, dmdY, dmdW, dmdH, 6);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = '#ff6600';
                ctx.font = 'bold 24px "Courier New"';
                ctx.textAlign = 'right';
                ctx.shadowColor = '#ff4400';
                ctx.shadowBlur = 10;
                ctx.fillText(score.toLocaleString(), dmdX + dmdW - 20, dmdY + 28);
                ctx.font = '12px "Courier New"';
                ctx.textAlign = 'left';
                ctx.fillStyle = '#ff9944';
                ctx.shadowBlur = 6;
                const displayBalls = ballsRemaining + (gameState === STATE.PLAYING || gameState === STATE.READY ? 1 :
                0);
                ctx.fillText('BALL ' + currentBall + '/' + displayBalls, dmdX + 15, dmdY + 18);
                if (bonusMultiplier > 1) {
                    ctx.fillStyle = '#ffdd00';
                    ctx.fillText('x' + bonusMultiplier, dmdX + 15, dmdY + 38);
                }
                ctx.fillStyle = '#888';
                ctx.shadowBlur = 3;
                ctx.textAlign = 'center';
                ctx.fillText('HI: ' + highScore.toLocaleString(), dmdX + dmdW / 2, dmdY + 38);
                if (messageTimer > 0 && messageText) {
                    ctx.fillStyle = '#ffcc00';
                    ctx.shadowColor = '#ff8800';
                    ctx.shadowBlur = 15;
                    ctx.font = 'bold 14px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.globalAlpha = Math.min(1, messageTimer / 30);
                    ctx.fillText(messageText, dmdX + dmdW / 2, dmdY + 52);
                    ctx.globalAlpha = 1;
                }
                if (bonusDisplayTimer > 0) {
                    ctx.fillStyle = '#00ff88';
                    ctx.shadowColor = '#00cc66';
                    ctx.shadowBlur = 12;
                    ctx.font = 'bold 16px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('BONUS: ' + bonusDisplayScore.toLocaleString(), dmdX + dmdW / 2, dmdY + 66);
                }
                ctx.restore();
            }

            function drawAttractMode() {
                if (gameState !== STATE.ATTRACT) return;
                const cx = 250,
                    cy = 400,
                    rx = 180,
                    ry = 250;
                const bx = cx + Math.cos(attractBallAngle) * rx;
                const by = cy + Math.sin(attractBallAngle * 1.3) * ry;
                ctx.save();
                ctx.globalAlpha = 0.5;
                const grad = ctx.createRadialGradient(bx, by, 2, bx, by, 15);
                grad.addColorStop(0, '#ffffff');
                grad.addColorStop(1, 'rgba(100,150,255,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(bx, by, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(bx, by, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ff4488';
                ctx.shadowColor = '#ff0066';
                ctx.shadowBlur = 25;
                ctx.font = 'bold 36px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText('CYBERPIN', 250, 400);
                ctx.fillStyle = '#44aaff';
                ctx.shadowColor = '#0088ff';
                ctx.font = '14px "Courier New"';
                ctx.fillText('PRESS SPACE TO START', 250, 430);
                ctx.restore();
            }

            function drawGameOverOverlay() {
                if (gameState !== STATE.GAME_OVER) return;
                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, VW, VH);
                ctx.fillStyle = '#ff4444';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 25;
                ctx.font = 'bold 32px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', 250, 380);
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 10;
                ctx.font = '18px "Courier New"';
                ctx.fillText('SCORE: ' + score.toLocaleString(), 250, 420);
                if (score >= highScore && highScore > 0) {
                    ctx.fillStyle = '#ffdd00';
                    ctx.fillText('★ NEW HIGH SCORE ★', 250, 450);
                }
                ctx.fillStyle = '#aaa';
                ctx.font = '14px "Courier New"';
                ctx.fillText('PRESS R TO RESTART', 250, 480);
                ctx.restore();
            }

            function drawLaunchPrompt() {
                if (gameState !== STATE.READY) return;
                const ball = balls.find(b => b.inLaunchLane);
                if (!ball || ball.launchPower > 0.05) return;
                ctx.save();
                ctx.fillStyle = '#fff';
                ctx.shadowColor = '#fff';
                ctx.shadowBlur = 10;
                ctx.font = 'bold 12px "Courier New"';
                ctx.textAlign = 'center';
                ctx.globalAlpha = 0.5 + Math.sin(gameTime * 0.08) * 0.5;
                ctx.fillText('▼ HOLD SPACE ▼', 439, 680);
                ctx.restore();
            }

            function render() {
                ctx.clearRect(0, 0, VW, VH);
                drawPlayfieldBackground();
                drawWalls();
                drawRolloverLanes();
                drawPopBumpers();
                drawDropTargets();
                drawSpinner();
                drawSlingshots();
                drawLaunchLane();
                drawFlippers();
                drawBalls();
                drawParticles(ctx);
                drawDMD();
                drawAttractMode();
                drawLaunchPrompt();
                drawGameOverOverlay();
                if (tiltWarnings > 0) {
                    ctx.save();
                    ctx.fillStyle = tiltWarnings >= 2 ? '#ff0000' : '#ff8800';
                    ctx.font = '10px "Courier New"';
                    ctx.textAlign = 'right';
                    ctx.fillText('⚠'.repeat(tiltWarnings), 490, 760);
                    ctx.restore();
                }
            }

            function gameLoop() {
                update();
                render();
                requestAnimationFrame(gameLoop);
            }

            function init() {
                gameState = STATE.ATTRACT;
                score = 0;
                ballsRemaining = 3;
                currentBall = 0;
                bonusMultiplier = 1;
                bonusBase = 0;
                spinnerCount = 0;
                comboCount = 0;
                comboTimer = 0;
                multiballActive = false;
                multiballCount = 0;
                tiltWarnings = 0;
                launchCharging = false;
                launchChargeStart = 0;
                resetDropTargets();
                resetLanes();
                dropTargetsCompleted = 0;
                balls.length = 0;
                particles.length = 0;
                attractBallAngle = 0;
                gameTime = 0;
                showMessage('CYBERPIN - PRESS SPACE', 300);
            }

            init();
            gameLoop();

            console.log('🦾 Cyberpin ready!');
            console.log('  SPACE = Launch / Start');
            console.log('  Z / ← = Left Flipper');
            console.log('  M / → = Right Flipper');
            console.log('  R = Restart');
            console.log('  High Score: ' + highScore.toLocaleString());
        })();
    </script>
</body>
</html>
